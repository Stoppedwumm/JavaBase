name: Debug/Commit Build

on:
  push:
    branches: [ "**" ] # Runs on all branches. Adjust to [ main ] if you only want it for main.
  workflow_dispatch:   # Allows you to run this manually from the Actions tab

permissions:
  contents: write # Still required if you want to push Javadoc changes

jobs:
  build-and-debug:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew jar

      - name: Generate Javadoc
        run: |
          rm -rf docs/javadoc/
          ./gradlew javadoc
          mkdir -p docs
          cp -r app/build/docs/javadoc/ docs/

      # Optional: In a debug build, you might NOT want to push to main every time.
      # This version only pushes Javadoc if you are on the 'main' branch.
      - name: Commit and Push Javadoc (Main only)
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if ! git diff --cached --exit-code; then
            git commit -m "Update Javadoc for commit ${{ github.sha }}"
            git push origin HEAD:main
          else
            echo "No Javadoc changes to commit."
          fi

      # Replace 'gh release upload' with 'actions/upload-artifact'
      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-jar-${{ github.sha }}
          path: app/build/libs/app.jar
          retention-days: 5 # Keeps the file for 5 days (default is 90)

      # Also upload Javadoc as an artifact so you can view it without pushing to git
      - name: Upload Javadoc Artifact
        uses: actions/upload-artifact@v4
        with:
          name: javadoc-${{ github.sha }}
          path: docs/javadoc/
