name: Release Build

on:
  release:
    types: [published]

permissions:
  contents: write # Required to upload assets to the release

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        # Runs the jar task (assumes you have the gradle wrapper committed)
        run: ./gradlew jar

      - name: Upload JAR to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Uses GitHub CLI (pre-installed) to upload the artifact
        run: |
          gh release upload ${{ github.event.release.tag_name }} build/libs/app.jar